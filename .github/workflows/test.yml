name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: reporium_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/reporium_test
      REDIS_URL: ""
      INGESTION_API_KEY: test-api-key
      GH_USERNAME: testuser

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt

      - run: pip install pytest pytest-asyncio==0.24.0 httpx

      - run: pytest tests/ -v

  notify-on-failure:
    needs: test
    if: failure()
    uses: perditioinc/perditio-devkit/.github/workflows/on-test-failure.yml@main
    with:
      branch: ${{ github.ref_name }}
      sha: ${{ github.sha }}
      run_id: ${{ github.run_id }}
      repo: ${{ github.repository }}
    permissions:
      issues: write
