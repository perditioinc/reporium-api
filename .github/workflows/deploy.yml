name: Deploy to Cloud Run
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply database migrations
        env:
          ENVIRONMENT: production
          GCP_PROJECT: perditio-platform
        run: alembic upgrade head

      - uses: google-github-actions/deploy-cloudrun@v2
        id: deploy
        with:
          service: reporium-api
          region: us-central1
          source: .
          flags: >-
            --memory=1Gi
            --cpu=1
            --min-instances=0
            --max-instances=10
            --concurrency=20
            --timeout=60

      - name: Publish api.deployed event
        if: success()
        continue-on-error: true
        run: |
          pip install -q google-cloud-pubsub google-cloud-firestore
          python - <<'EOF'
          import asyncio, os, sys
          sys.path.insert(0, '.')
          from reporium_events.models import EventType
          from reporium_events.publisher import publish_event

          async def main():
              await publish_event(
                  event_type=EventType.API_DEPLOYED,
                  source="reporium-api",
                  payload={
                      "service": "reporium-api",
                      "version": os.getenv("GITHUB_SHA", "unknown")[:7],
                      "url": "https://reporium-api-573778300586.us-central1.run.app",
                  },
              )
              print("Published api.deployed event")

          asyncio.run(main())
          EOF
