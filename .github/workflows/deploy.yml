name: Deploy to Cloud Run
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply database migrations
        env:
          ENVIRONMENT: production
          GCP_PROJECT: perditio-platform
        run: alembic upgrade head

      - uses: google-github-actions/deploy-cloudrun@v2
        id: deploy
        with:
          service: reporium-api
          region: us-central1
          source: .
          flags: >-
            --memory=2Gi
            --cpu=1
            --min-instances=0
            --max-instances=3
            --concurrency=20
            --timeout=60

      - name: Prune old container images (keep latest 5)
        if: success()
        continue-on-error: true
        run: |
          # Delete untagged images first
          gcloud container images list-tags gcr.io/perditio-platform/reporium-api \
            --filter="NOT tags:*" --format="get(digest)" | \
            while read digest; do
              gcloud container images delete \
                "gcr.io/perditio-platform/reporium-api@${digest}" \
                --quiet --force-delete-tags 2>/dev/null || true
            done
          # Keep only the 5 most recent tagged images
          gcloud container images list-tags gcr.io/perditio-platform/reporium-api \
            --sort-by="~TIMESTAMP" --format="get(digest)" | tail -n +6 | \
            while read digest; do
              gcloud container images delete \
                "gcr.io/perditio-platform/reporium-api@${digest}" \
                --quiet --force-delete-tags 2>/dev/null || true
            done

      - name: Post-deploy taxonomy rebuild
        if: success()
        continue-on-error: true
        env:
          API_URL: https://reporium-api-573778300586.us-central1.run.app
          INGEST_API_KEY: ${{ secrets.INGEST_API_KEY }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
        run: |
          # Wait for Cloud Run to be healthy
          sleep 15
          # Rebuild taxonomy_values from repo_taxonomy (fast batch INSERT — no timeout risk)
          curl -sf -X POST "${API_URL}/admin/taxonomy/rebuild" \
            -H "Authorization: Bearer ${INGEST_API_KEY}" \
            -H "X-Admin-Key: ${ADMIN_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            && echo "Taxonomy rebuild triggered" || echo "Taxonomy rebuild skipped (secrets not configured)"

      - name: Publish api.deployed event
        if: success()
        continue-on-error: true
        run: |
          pip install -q google-cloud-pubsub google-cloud-firestore git+https://github.com/perditioinc/reporium-events.git
          python - <<'EOF'
          import asyncio, os, sys
          sys.path.insert(0, '.')
          from reporium_events.models import EventType
          from reporium_events.publisher import publish_event

          async def main():
              await publish_event(
                  event_type=EventType.API_DEPLOYED,
                  source="reporium-api",
                  payload={
                      "service": "reporium-api",
                      "version": os.getenv("GITHUB_SHA", "unknown")[:7],
                      "url": "https://reporium-api-573778300586.us-central1.run.app",
                  },
              )
              print("Published api.deployed event")

          asyncio.run(main())
          EOF
