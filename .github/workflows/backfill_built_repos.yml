name: Backfill Built Repos
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx sqlalchemy[asyncio] asyncpg google-cloud-secret-manager

      - name: Resolve DB URL from Secret Manager
        run: |
          python -c "
          from google.cloud import secretmanager
          client = secretmanager.SecretManagerServiceClient()
          name = 'projects/perditio-platform/secrets/reporium-db-url-async/versions/latest'
          response = client.access_secret_version(request={'name': name})
          url = response.payload.data.decode('UTF-8')
          # Write to env file for next step
          with open('$GITHUB_ENV', 'a') as f:
              f.write(f'DATABASE_URL={url}\n')
          print('DB URL resolved successfully')
          "

      - name: Run backfill
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/backfill_built_repos.py
