apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: reporium-api
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "3"
    spec:
      containerConcurrency: 20
      timeoutSeconds: 60
      containers:
        - image: gcr.io/PROJECT_ID/reporium-api:latest
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
